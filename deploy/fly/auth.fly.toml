# auth.fly.toml — oauth2-proxy front door for EPM Wizard (optional, recommended).
#
# This app is the ONLY public entry point once the auth gate is enabled (the
# frontend has no public IP). It serves the frontend's public landing page at
# "/" WITHOUT auth, and authenticates users against Google (or GitHub) OAuth
# before letting them into the app at "/app" — see OAUTH2_PROXY_SKIP_AUTH_ROUTES
# below. It reverse-proxies authenticated traffic to the frontend over 6PN.
# It injects X-Forwarded-Email, which nginx forwards to the backend for per-user
# data scoping (EPMW_MULTI_USER=true). Mirrors the old IBM App ID login gate.
#
# Deploy with the stock upstream image (no Dockerfile / build needed):
#   fly deploy --config deploy/fly/auth.fly.toml --app epmw-auth --ha=false --yes
# Then release the frontend's public IPs so it is reachable only through here.
# See README §6 for the full runbook (OAuth client, secrets, allowlist file).

app = "epmw-auth"
primary_region = "iad"

[build]
  # Pinned upstream image — no local build.
  image = "quay.io/oauth2-proxy/oauth2-proxy:v7.6.0"

[env]
  OAUTH2_PROXY_HTTP_ADDRESS = "0.0.0.0:4180"
  # Reverse-proxy to the frontend over private 6PN. Match the frontend app name.
  OAUTH2_PROXY_UPSTREAMS = "http://epmw-frontend.internal:3000"
  OAUTH2_PROXY_PROVIDER = "google"
  OAUTH2_PROXY_REVERSE_PROXY = "true"
  # Pass identity upstream; nginx reads X-Forwarded-Email and forwards it on.
  OAUTH2_PROXY_PASS_USER_HEADERS = "true"
  OAUTH2_PROXY_SET_XAUTHREQUEST = "true"
  # ---- Public landing page + docs, gated app ------------------------------
  # The frontend serves a PUBLIC marketing landing at "/" and public product
  # documentation at "/docs" (both rendered by the SPA outside the /app tree).
  # These routes reach the upstream WITHOUT auth: the landing/docs pages and the
  # static bundle they need to render. Everything else (notably "/app" and
  # "/api") still requires a Google login. Regexes match the request path (RE2);
  # "^/docs(/|$)" covers the docs page and any future docs sub-paths without
  # matching look-alike prefixes. TOML literal (single-quoted) string so
  # backslashes pass through.
  # NOTE: "^/api/ext(/|$)" lets the browser-agent extension's TOKEN-gated routes
  # (/api/ext/*) reach the backend WITHOUT a Google session — that's how the
  # extension runs autonomously. It is safe to skip the login gate here because
  # the backend REQUIRES a valid "Authorization: Bearer epmw_…" token on those
  # routes (see backend get_owner_from_token) and never trusts a client identity
  # header on them. The interactive app (/app, the rest of /api) still needs a
  # Google login.
  OAUTH2_PROXY_SKIP_AUTH_ROUTES = '^/$,^/docs(/|$),^/api/ext(/|$),^/assets/,^/favicon,^/apple-touch-icon,^/icon-,^/site\.webmanifest'
  # The landing IS our sign-in page, so skip oauth2-proxy's own button page and
  # send a gated request (e.g. the landing's "Sign in with Google" → /app)
  # straight to Google, returning to the originally requested path afterwards.
  OAUTH2_PROXY_SKIP_PROVIDER_BUTTON = "true"
  # API calls answer 401 (not a 302 to Google) when the session lapses, so the
  # SPA can handle re-auth gracefully instead of a fetch failing on a redirect.
  OAUTH2_PROXY_API_ROUTES = '^/api'
  # Who can log in. DEFAULT (simplest for a few users): allow any Google account
  # that clears the OAuth screen, and restrict WHO clears it via the Google
  # OAuth consent screen's "Test users" list (keep the app in Testing mode and
  # add your users' emails there) — no file, no volume. See README §6.
  OAUTH2_PROXY_EMAIL_DOMAINS = "*"
  # HARDER allowlist (optional): enforce the list at the proxy too. Uncomment
  # this AND the [mounts] block below, then write /etc/oauth2-proxy/emails.txt
  # (one email per line) via `fly ssh console -a epmw-auth`. README §6.
  # OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE = "/etc/oauth2-proxy/emails.txt"
  # Cookie hardening.
  OAUTH2_PROXY_COOKIE_SECURE = "true"
  OAUTH2_PROXY_COOKIE_EXPIRE = "168h"
  # SameSite=None so the session cookie is sent on the browser-agent extension's
  # cross-site background requests ("integrated" mode — drive the agent while
  # signed in on the website, no token). Requires Secure=true (set above).
  # oauth2-proxy keeps its own CSRF state cookie, so relaxing SameSite here does
  # not open the login flow to CSRF. Users who only use token ("autonomous")
  # mode don't rely on this.
  OAUTH2_PROXY_COOKIE_SAMESITE = "none"
  # SECRETS (set via `fly secrets set -a epmw-auth`, see README §6):
  #   OAUTH2_PROXY_CLIENT_ID      — OAuth client id
  #   OAUTH2_PROXY_CLIENT_SECRET  — OAuth client secret
  #   OAUTH2_PROXY_COOKIE_SECRET  — 32 bytes, URL-safe base64. MUST be
  #     openssl rand -base64 32 | tr -- '+/' '-_'
  #     (plain base64 with +/ is not decoded and crash-loops the proxy)

[http_service]
  internal_port = 4180
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

# Volume for the OPTIONAL email allowlist file (only needed if you uncomment
# OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE above). Left commented so the default
# deploy needs no volume — restriction is via the Google Test-users list.
# [mounts]
#   source = "epmw_auth_cfg"
#   destination = "/etc/oauth2-proxy"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
