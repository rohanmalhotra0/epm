# auth.fly.toml — oauth2-proxy front door for EPM Wizard (optional, recommended).
#
# This app is the ONLY public entry point once the auth gate is enabled. It
# authenticates users against Google (or GitHub) OAuth, enforces an email
# allowlist, and reverse-proxies authenticated traffic to the frontend over 6PN.
# It injects X-Forwarded-Email, which nginx forwards to the backend for per-user
# data scoping (EPMW_MULTI_USER=true). Mirrors the old IBM App ID login gate.
#
# Deploy with the stock upstream image (no Dockerfile / build needed):
#   fly deploy --config deploy/fly/auth.fly.toml --app epmw-auth --ha=false --yes
# Then release the frontend's public IPs so it is reachable only through here.
# See README §6 for the full runbook (OAuth client, secrets, allowlist file).

app = "epmw-auth"
primary_region = "iad"

[build]
  # Pinned upstream image — no local build.
  image = "quay.io/oauth2-proxy/oauth2-proxy:v7.6.0"

[env]
  OAUTH2_PROXY_HTTP_ADDRESS = "0.0.0.0:4180"
  # Reverse-proxy to the frontend over private 6PN. Match the frontend app name.
  OAUTH2_PROXY_UPSTREAMS = "http://epmw-frontend.internal:3000"
  OAUTH2_PROXY_PROVIDER = "google"
  OAUTH2_PROXY_REVERSE_PROXY = "true"
  # Pass identity upstream; nginx reads X-Forwarded-Email and forwards it on.
  OAUTH2_PROXY_PASS_USER_HEADERS = "true"
  OAUTH2_PROXY_SET_XAUTHREQUEST = "true"
  # Who can log in. DEFAULT (simplest for a few users): allow any Google account
  # that clears the OAuth screen, and restrict WHO clears it via the Google
  # OAuth consent screen's "Test users" list (keep the app in Testing mode and
  # add your users' emails there) — no file, no volume. See README §6.
  OAUTH2_PROXY_EMAIL_DOMAINS = "*"
  # HARDER allowlist (optional): enforce the list at the proxy too. Uncomment
  # this AND the [mounts] block below, then write /etc/oauth2-proxy/emails.txt
  # (one email per line) via `fly ssh console -a epmw-auth`. README §6.
  # OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE = "/etc/oauth2-proxy/emails.txt"
  # Cookie hardening.
  OAUTH2_PROXY_COOKIE_SECURE = "true"
  OAUTH2_PROXY_COOKIE_EXPIRE = "168h"
  # SECRETS (set via `fly secrets set -a epmw-auth`, see README §6):
  #   OAUTH2_PROXY_CLIENT_ID      — OAuth client id
  #   OAUTH2_PROXY_CLIENT_SECRET  — OAuth client secret
  #   OAUTH2_PROXY_COOKIE_SECRET  — 32-byte base64 (openssl rand -base64 32)

[http_service]
  internal_port = 4180
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

# Volume for the OPTIONAL email allowlist file (only needed if you uncomment
# OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE above). Left commented so the default
# deploy needs no volume — restriction is via the Google Test-users list.
# [mounts]
#   source = "epmw_auth_cfg"
#   destination = "/etc/oauth2-proxy"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
