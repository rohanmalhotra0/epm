# frontend.fly.toml — EPM Wizard frontend (Vite build served by nginx) on Fly.io
#
# Reuses the EXISTING image at frontend/Dockerfile (nginx on port 3000). That
# nginx config proxies /api/ to ${BACKEND_URL} via envsubst at container start,
# so BACKEND_URL below points at the backend's private 6PN address.
#
# Build context must be the REPO ROOT (the Dockerfile COPYs `frontend/...`).
# deploy-fly.sh runs `fly deploy <repo-root> --config … --dockerfile frontend/Dockerfile`.
#
# Posture: PUBLIC and scale-to-zero friendly. When the oauth2-proxy auth gate is
# deployed (README §6) this app is made PRIVATE and the auth app becomes the only
# public entry point — release this app's public IPs at that point.

app = "epmw-frontend"
primary_region = "iad"

[build]
  # Relative to THIS toml's dir (deploy/fly/); build context is the repo root
  # (set by deploy-fly.sh) so the Dockerfile's COPY frontend/... resolves.
  dockerfile = "../../frontend/Dockerfile"

[env]
  # Backend's private 6PN address. Must match backend.fly.toml's `app` name.
  # If you rename the backend app, change the host here too.
  BACKEND_URL = "http://epmw-backend.internal:8000"
  # Fly's internal DNS resolver for .internal 6PN names. nginx uses this to
  # re-resolve BACKEND_URL per request (valid=10s), so replacing the backend
  # machine (new 6PN IP) no longer strands this proxy on a dead address.
  DNS_RESOLVER = "[fdaa::3]:53"
  # nginx entrypoint substitutes ${BACKEND_URL} + ${DNS_RESOLVER} (the filter is
  # an env-var-name regex; it protects nginx's own $host/$uri/... variables).
  NGINX_ENVSUBST_FILTER = "BACKEND_URL|DNS_RESOLVER"

[http_service]
  internal_port = 3000
  force_https = true
  # Always-on. Once the auth gate is deployed this app is PRIVATE (public IPs
  # released) and only receives 6PN traffic from oauth2-proxy — and Fly's proxy
  # cannot auto-wake a suspended machine for .internal traffic, so scale-to-zero
  # here means a permanent 502 behind the gate. nginx on shared-cpu-1x is ~$2/mo.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
