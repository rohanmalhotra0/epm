# backend.fly.toml — EPM Wizard backend (FastAPI + SSE chat) on Fly.io
#
# Reuses the EXISTING image at backend/Dockerfile (uvicorn on 0.0.0.0:8000).
# Build context must be the REPO ROOT because that Dockerfile COPYs both
# `backend/...` and `frontend/src/schemas/schemas.json`. deploy-fly.sh handles
# this by running `fly deploy <repo-root> --config … --dockerfile backend/Dockerfile`.
#
# Posture: keep this app WARM and PRIVATE.
#   • min_machines_running = 1 + auto_stop_machines = "off"  → no cold start can
#     interrupt an in-flight SSE stream (research finding §5 in OPENCLAW_PLAN.md).
#   • Frontend nginx reaches it over 6PN private DNS at
#     http://epmw-backend.internal:8000 — no public IP required. deploy-fly.sh
#     best-effort releases any public IP Fly allocates (see harden_backend_private).
#
# App name is referenced by frontend.fly.toml's BACKEND_URL. If you rename this
# app (BACKEND_APP env in deploy-fly.sh), update BACKEND_URL there too.

app = "epmw-backend"
primary_region = "iad"

[build]
  # Path is relative to the build context (the repo root), which deploy-fly.sh
  # sets explicitly. Kept here for `fly deploy` runs made from the repo root.
  dockerfile = "backend/Dockerfile"

[env]
  EPMW_DATA_DIR = "/data"
  # Multi-user owner-scoping ON: projects are scoped to the identity in the
  # X-Forwarded-Email header injected by the frontend nginx (which receives it
  # from oauth2-proxy when the auth gate is deployed — see README §6).
  EPMW_MULTI_USER = "true"
  EPMW_AUTH_EMAIL_HEADER = "X-Forwarded-Email"
  # Provider default. Per-project provider/model is configurable in-app; the
  # TOGETHER_API_KEY secret (below) enables the Together provider.
  EPMW_DEFAULT_PROVIDER = "together"
  EPMW_LOG_JSON = "true"
  # SECRETS (never in this file — set via `fly secrets set`, see deploy-fly.sh):
  #   TOGETHER_API_KEY         — Together AI inference key
  #   EPMW_DATABASE_URL        — Neon Postgres, e.g.
  #                              postgresql+psycopg://USER:PASS@HOST/db?sslmode=require
  #   EPMW_SECRET_MASTER_KEY   — stable key for the encrypted local secret store
  #                              (without it a fresh key is generated on the volume
  #                               each deploy and stored per-machine; set it so
  #                               stored provider secrets survive machine replacement)

[http_service]
  internal_port = 8000
  # Backend is private; Fly's HTTPS edge is not used for it. force_https off so a
  # public IP (if any is left allocated) doesn't redirect internal health checks.
  force_https = false
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    method = "get"
    path = "/api/health"
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"

# Persistent disk. REQUIRED even with external Postgres: the app writes
# artifacts, contexts, the encrypted secret store, RAG indexes and SQLite
# backups under EPMW_DATA_DIR (=/data). deploy-fly.sh creates the volume.
# With one volume you must run a single machine — deploy with `--ha=false`.
[mounts]
  source = "epmw_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
