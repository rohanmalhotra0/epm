server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to the backend. The upstream is templated from ${BACKEND_URL}
    # at container start (nginx envsubst): docker-compose uses the default
    # http://backend:8000; Code Engine injects the backend's cluster-local URL.
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Server-Sent Events: disable buffering, allow long-lived streams.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Connection "";
    }

    # Long cache for hashed assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
