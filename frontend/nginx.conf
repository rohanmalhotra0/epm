server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to the backend. The upstream is templated from ${BACKEND_URL}
    # at container start (nginx envsubst): docker-compose uses the default
    # http://backend:8000; Code Engine injects the backend's cluster-local URL.
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        # $proxy_host = the host from proxy_pass. Knative/Code Engine routes BY
        # HOST HEADER, so forwarding the browser's $host here sends the backend's
        # ingress a request for the *frontend's* domain — unroutable, hangs.
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        # Forward the authenticated user's email (set by oauth2-proxy in front of
        # this nginx) so the backend can scope data per user when
        # EPMW_MULTI_USER=true. Empty when the login gate isn't deployed.
        proxy_set_header X-Forwarded-Email $http_x_forwarded_email;

        # Server-Sent Events: disable buffering, allow long-lived streams.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Connection "";
    }

    # Long cache for hashed assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
