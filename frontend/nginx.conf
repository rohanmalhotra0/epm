server {
    # Listen on IPv4 AND IPv6: Fly's private 6PN network is IPv6-only, so the
    # oauth2-proxy gate reaches this nginx at an fdaa:: address. IPv4-only
    # listen means "connection refused" for every private caller.
    listen 3000;
    listen [::]:3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to the backend. The upstream is templated from ${BACKEND_URL}
    # at container start (nginx envsubst): docker-compose uses the default
    # http://backend:8000; hosted deploys inject the backend's internal URL.
    location /api/ {
        # Re-resolve the upstream hostname at request time instead of caching it
        # forever. nginx resolves a bare proxy_pass host ONCE at startup; on Fly
        # the backend's private 6PN address changes whenever its machine is
        # replaced (deploy / crash / recreate), which would silently strand this
        # proxy on a dead IP and hang every /api call. Using a variable in
        # proxy_pass forces nginx to consult the resolver per request (cached
        # for `valid`). ${DNS_RESOLVER} is templated per environment: Docker's
        # embedded DNS (127.0.0.11) for compose, Fly's internal DNS ([fdaa::3]:53)
        # for hosted. $request_uri preserves the full /api/... path + query.
        resolver ${DNS_RESOLVER} valid=10s;
        set $backend_upstream ${BACKEND_URL};
        proxy_pass $backend_upstream$request_uri;
        proxy_http_version 1.1;
        # $proxy_host = the host from proxy_pass, so upstreams that route by
        # Host header see their own domain, not the frontend's.
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        # Forward the authenticated user's email (set by oauth2-proxy in front of
        # this nginx) so the backend can scope data per user when
        # EPMW_MULTI_USER=true. Empty when the login gate isn't deployed.
        proxy_set_header X-Forwarded-Email $http_x_forwarded_email;

        # Server-Sent Events: disable buffering, allow long-lived streams.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Connection "";
    }

    # Long cache for hashed assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
