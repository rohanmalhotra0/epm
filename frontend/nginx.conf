# Vite gives every generated file under /assets/ a content hash. Those files
# are safe to cache forever, while the unversioned HTML shell and extension ZIP
# must be refreshed on every deployment. Mapping by the final internal URI also
# covers SPA fallbacks, which are internally redirected to /index.html.
map $uri $epmw_cache_control {
    default                          "no-cache";
    ~^/assets/                      "public, max-age=31536000, immutable";
    /index.html                     "no-store, no-cache, must-revalidate, max-age=0";
    /epm-wizard-extension.zip       "no-store, max-age=0";
}

server {
    # Listen on IPv4 AND IPv6: Fly's private 6PN network is IPv6-only, so the
    # oauth2-proxy gate reaches this nginx at an fdaa:: address. IPv4-only
    # listen means "connection refused" for every private caller.
    listen 3000;
    listen [::]:3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression for text-based application assets. WOFF/WOFF2 and ZIP files
    # are already compressed, so recompressing them would only waste CPU.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        application/xml
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript;

    # Conservative response hardening that does not constrain OAuth, API
    # streaming, browser-agent downloads, or future app embedding with a CSP.
    add_header Cache-Control $epmw_cache_control always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # A missing hashed chunk must be a real 404, never the SPA HTML fallback.
    # This lets the app's chunk-load error boundary offer a clean reload.
    location ^~ /assets/ {
        try_files $uri @missing_asset;
        access_log off;
    }

    # Do not cache a transient missing-chunk response. A successful hashed file
    # remains immutable, but a 404 should be retried after deployment recovery.
    location @missing_asset {
        add_header Cache-Control "no-store, max-age=0" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        return 404;
    }

    # Explicit locations document the two unversioned deploy-sensitive files.
    # Cache-Control is supplied by the URI map above.
    location = /index.html {
        try_files $uri =404;
    }

    location = /epm-wizard-extension.zip {
        try_files $uri =404;
    }

    # nginx's stock mime.types does not include .webmanifest. An explicit type
    # keeps the install metadata usable with X-Content-Type-Options: nosniff.
    location = /site.webmanifest {
        default_type application/manifest+json;
        try_files $uri =404;
    }

    # Proxy API to the backend. The upstream is templated from ${BACKEND_URL}
    # at container start (nginx envsubst): docker-compose uses the default
    # http://backend:8000; hosted deploys inject the backend's internal URL.
    location /api/ {
        # Re-resolve the upstream hostname at request time instead of caching it
        # forever. nginx resolves a bare proxy_pass host ONCE at startup; on Fly
        # the backend's private 6PN address changes whenever its machine is
        # replaced (deploy / crash / recreate), which would silently strand this
        # proxy on a dead IP and hang every /api call. Using a variable in
        # proxy_pass forces nginx to consult the resolver per request (cached
        # for `valid`). ${DNS_RESOLVER} is templated per environment: Docker's
        # embedded DNS (127.0.0.11) for compose, Fly's internal DNS ([fdaa::3]:53)
        # for hosted. $request_uri preserves the full /api/... path + query.
        resolver ${DNS_RESOLVER} valid=10s;
        set $backend_upstream ${BACKEND_URL};
        proxy_pass $backend_upstream$request_uri;
        proxy_http_version 1.1;
        # $proxy_host = the host from proxy_pass, so upstreams that route by
        # Host header see their own domain, not the frontend's.
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        # Forward the authenticated user's email (set by oauth2-proxy in front of
        # this nginx) so the backend can scope data per user when
        # EPMW_MULTI_USER=true. Empty when the login gate isn't deployed.
        proxy_set_header X-Forwarded-Email $http_x_forwarded_email;

        # Server-Sent Events: disable buffering, allow long-lived streams.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Connection "";
    }
}
