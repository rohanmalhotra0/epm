name: Installed Extension E2E

on:
  pull_request: {}
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  chromium-extension:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Validate extension JavaScript
        run: |
          find extension -type f -name '*.js' -print0 |
            xargs -0 -n1 node --check
      - name: Run installed-extension tests
        working-directory: frontend
        run: xvfb-run --auto-servernum npm run e2e:extension
      - name: Upload extension evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: installed-extension-playwright-report
          path: |
            frontend/playwright-report/extension
            frontend/test-results/extension
          if-no-files-found: ignore
          retention-days: 14
