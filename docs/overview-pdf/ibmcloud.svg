<svg viewBox="0 0 700 282" xmlns="http://www.w3.org/2000/svg">
  <!-- user -->
  <rect x="10" y="106" width="122" height="62" fill="none" stroke="black" stroke-width="1.2"/>
  <text x="71" y="126" text-anchor="middle" font-family="Helvetica" font-size="10" font-weight="bold">Teammate</text>
  <text x="71" y="140" text-anchor="middle" font-family="Helvetica" font-size="8.5">browser only —</text>
  <text x="71" y="152" text-anchor="middle" font-family="Helvetica" font-size="8.5">email invite + link</text>

  <line x1="132" y1="137" x2="158" y2="137" stroke="black" stroke-width="1.2"/>
  <polygon points="164,137 156,133 156,141" fill="black"/>

  <!-- App ID -->
  <rect x="164" y="106" width="128" height="62" fill="none" stroke="#0f62fe" stroke-width="1.5"/>
  <text x="228" y="126" text-anchor="middle" font-family="Helvetica" font-size="10" font-weight="bold" fill="#0f62fe">IBM App ID</text>
  <text x="228" y="140" text-anchor="middle" font-family="Helvetica" font-size="8.5">OIDC sign-in · cloud-</text>
  <text x="228" y="152" text-anchor="middle" font-family="Helvetica" font-size="8.5">directory email invites</text>
  <text x="228" y="182" text-anchor="middle" font-family="Helvetica" font-size="8">optional: Client-to-Site VPN</text>
  <text x="228" y="193" text-anchor="middle" font-family="Helvetica" font-size="8">in front (Terraform toggle)</text>

  <line x1="292" y1="137" x2="318" y2="137" stroke="black" stroke-width="1.2"/>
  <polygon points="324,137 316,133 316,141" fill="black"/>
  <text x="308" y="128" text-anchor="middle" font-family="Helvetica" font-size="7.5">HTTPS</text>

  <!-- Code Engine -->
  <rect x="324" y="52" width="196" height="168" fill="none" stroke="black" stroke-width="1.6"/>
  <text x="422" y="70" text-anchor="middle" font-family="Helvetica" font-size="10.5" font-weight="bold">Code Engine (scales to zero)</text>
  <rect x="340" y="82" width="164" height="40" fill="none" stroke="black"/>
  <text x="422" y="99" text-anchor="middle" font-family="Helvetica" font-size="9" font-weight="bold">epmw-frontend</text>
  <text x="422" y="112" text-anchor="middle" font-family="Helvetica" font-size="8">nginx SPA (Carbon UI)</text>
  <rect x="340" y="132" width="164" height="40" fill="none" stroke="black"/>
  <text x="422" y="149" text-anchor="middle" font-family="Helvetica" font-size="9" font-weight="bold">epmw-backend</text>
  <text x="422" y="162" text-anchor="middle" font-family="Helvetica" font-size="8">FastAPI · private endpoint</text>
  <line x1="422" y1="122" x2="422" y2="126" stroke="black"/>
  <polygon points="422,132 418,124 426,124" fill="black"/>
  <text x="422" y="192" text-anchor="middle" font-family="Helvetica" font-size="8">images from Container Registry;</text>
  <text x="422" y="203" text-anchor="middle" font-family="Helvetica" font-size="8">provisioned by deploy/ibm-cloud/ Terraform</text>

  <!-- watsonx -->
  <rect x="560" y="52" width="130" height="58" fill="none" stroke="#0f62fe" stroke-width="1.5"/>
  <text x="625" y="72" text-anchor="middle" font-family="Helvetica" font-size="10" font-weight="bold" fill="#0f62fe">watsonx.ai</text>
  <text x="625" y="86" text-anchor="middle" font-family="Helvetica" font-size="8.5">Granite or your</text>
  <text x="625" y="98" text-anchor="middle" font-family="Helvetica" font-size="8.5">tuned model</text>
  <line x1="520" y1="90" x2="552" y2="90" stroke="black" stroke-dasharray="4,3"/>
  <polygon points="558,90 550,86 550,94" fill="black"/>

  <!-- Oracle -->
  <rect x="560" y="132" width="130" height="58" fill="none" stroke="#0f62fe" stroke-width="1.5"/>
  <text x="625" y="152" text-anchor="middle" font-family="Helvetica" font-size="10" font-weight="bold" fill="#0f62fe">Oracle EPM Cloud</text>
  <text x="625" y="166" text-anchor="middle" font-family="Helvetica" font-size="8.5">via connector boundary</text>
  <text x="625" y="178" text-anchor="middle" font-family="Helvetica" font-size="8.5">outbound only</text>
  <line x1="520" y1="161" x2="552" y2="161" stroke="black" stroke-dasharray="4,3"/>
  <polygon points="558,161 550,157 550,165" fill="black"/>

  <!-- bottom services -->
  <rect x="180" y="238" width="150" height="36" fill="none" stroke="black"/>
  <text x="255" y="253" text-anchor="middle" font-family="Helvetica" font-size="9" font-weight="bold">Secrets Manager</text>
  <text x="255" y="266" text-anchor="middle" font-family="Helvetica" font-size="8">Oracle creds · API keys</text>
  <line x1="330" y1="248" x2="350" y2="222" stroke="black"/>
  <polygon points="354,217 346,219 352,225" fill="black"/>

  <rect x="346" y="238" width="150" height="36" fill="none" stroke="black"/>
  <text x="421" y="253" text-anchor="middle" font-family="Helvetica" font-size="9" font-weight="bold">COS / PostgreSQL</text>
  <text x="421" y="266" text-anchor="middle" font-family="Helvetica" font-size="8">backups · team database</text>
  <line x1="421" y1="238" x2="421" y2="226" stroke="black"/>
  <polygon points="421,220 417,228 425,228" fill="black"/>

  <rect x="512" y="238" width="150" height="36" fill="none" stroke="black"/>
  <text x="587" y="253" text-anchor="middle" font-family="Helvetica" font-size="9" font-weight="bold">Cloud Logs / Monitoring</text>
  <text x="587" y="266" text-anchor="middle" font-family="Helvetica" font-size="8">observability</text>
  <line x1="512" y1="248" x2="494" y2="224" stroke="black"/>
  <polygon points="490,219 490,228 498,223" fill="black"/>

  <text x="10" y="30" font-family="Helvetica" font-size="9" font-weight="bold">Goal: email invite + link → sign in → request to cloud. All IBM; local dev unchanged.</text>
</svg>
