# EPM Wizard — local-first stack. Run with:  docker compose up --build
# Frontend is published on the host; the backend API binds to localhost only and
# is reached by the frontend over the internal Docker network (nginx proxy).

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      EPMW_DATA_DIR: /data
      EPMW_LOG_LEVEL: INFO
      EPMW_LOG_JSON: "true"
      EPMW_EPMAUTOMATE_PATH: /epmautomate/bin/epmautomate.sh
      EPMW_JAVA_HOME: /usr/lib/jvm/java-21-openjdk-arm64
    env_file:
      - path: .env
        required: false
    volumes:
      - epmw-data:/data
      - /Users/rohanmalhotra/Downloads/epmautomate:/epmautomate:ro
    # localhost-only publish for power users / direct API access; the frontend
    # reaches the backend via the internal network regardless.
    ports:
      - "127.0.0.1:${EPMW_BACKEND_PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "${EPMW_FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  epmw-data:
